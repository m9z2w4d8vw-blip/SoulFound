name: Build IPA

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project SoulFound.xcodeproj \
            -scheme SoulFound \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/SoulFound.app Payload/
          zip -r SoulFound.ipa Payload/
          echo "IPA built successfully"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: SoulFound.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
